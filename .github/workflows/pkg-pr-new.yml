name: pkg-pr-new
on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build:
    if: ${{ github.repository == 'Tencent/tdesign-vue-next' && !startsWith(github.head_ref, 'release/')}}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run '/build:*/'

      - run: |
          mkdir templates
          cd templates
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-vite --template vue-vite
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-vite-on-demand --template vue-vite-on-demand
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-tsx-vite --template vue-tsx-vite
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-tsx-rspack --template vue-tsx-rspack
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-rspack --template vue-rspack
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-rspack-on-demand --template vue-rspack-on-demand
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-chat-vite --template vue-chat-vite
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-chat-vite-on-demand --template vue-chat-vite-on-demand
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-chat-tsx-vite --template vue-chat-tsx-vite
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-chat-tsx-rspack --template vue-chat-tsx-rspack
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-chat-rspack --template vue-chat-rspack
          pnpm dlx https://pkg.pr.new/liweijie0812/create-tdesign@main vue-chat-rspack-on-demand --template vue-chat-rspack-on-demand

      - run: pnpm dlx pkg-pr-new publish './packages/tdesign-vue-next' './packages/tdesign-vue-next-chat' './packages/auto-import-resolver' --pnpm --template ./templates
